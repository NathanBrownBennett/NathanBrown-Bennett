<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d00"/>
      <stop offset="100%" style="stop-color:#1a1000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Map grid lines -->
  <g stroke="#FFD700" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>

  <!-- Location pins on map -->
  <!-- Pin 1 -->
  <g transform="translate(200, 120)" filter="url(#glow)">
    <ellipse cx="20" cy="55" rx="8" ry="3" fill="#000" opacity="0.3"/>
    <path d="M20,0 Q36,0 36,18 Q36,36 20,52 Q4,36 4,18 Q4,0 20,0" fill="#FF6B35" opacity="0.9"/>
    <circle cx="20" cy="18" r="7" fill="#1a0d00" opacity="0.8"/>
    <circle cx="20" cy="18" r="4" fill="#FFD700" opacity="0.9"/>
  </g>

  <!-- Pin 2 -->
  <g transform="translate(350, 160)" filter="url(#glow)">
    <path d="M18,0 Q32,0 32,16 Q32,32 18,46 Q4,32 4,16 Q4,0 18,0" fill="#FFD700" opacity="0.9"/>
    <circle cx="18" cy="16" r="6" fill="#1a0d00" opacity="0.8"/>
    <circle cx="18" cy="16" r="3" fill="#FF6B35" opacity="0.9"/>
  </g>

  <!-- Pin 3 -->
  <g transform="translate(500, 100)" filter="url(#glow)">
    <path d="M18,0 Q32,0 32,16 Q32,32 18,46 Q4,32 4,16 Q4,0 18,0" fill="#FF6B35" opacity="0.8"/>
    <circle cx="18" cy="16" r="6" fill="#1a0d00" opacity="0.8"/>
  </g>

  <!-- Lines connecting pins (mission routes) -->
  <g stroke="#FFD700" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4">
    <line x1="220" y1="165" x2="368" y2="203"/>
    <line x1="368" y1="203" x2="518" y2="148"/>
  </g>

  <!-- Challenge card (centre) -->
  <g transform="translate(280, 220)">
    <rect width="240" height="110" rx="10" fill="#2a1800" stroke="#FFD700" stroke-width="1.5" opacity="0.95"/>
    <rect width="240" height="28" rx="10" fill="#FF6B35" opacity="0.8"/>
    <text x="12" y="18" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">🎮 MISSION #07</text>
    <text x="12" y="50" font-family="monospace" font-size="10" fill="#FFD700" opacity="0.9">Decrypt the hidden message</text>
    <text x="12" y="66" font-family="monospace" font-size="10" fill="#FFD700" opacity="0.7">at Landmark HQ...</text>
    <!-- XP badge -->
    <rect x="150" y="75" width="76" height="22" rx="11" fill="#FF6B35" opacity="0.7"/>
    <text x="188" y="90" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#fff">+250 XP</text>
    <!-- Progress bar -->
    <rect x="12" y="82" width="130" height="6" rx="3" fill="#1a0d00" opacity="0.6"/>
    <rect x="12" y="82" width="78" height="6" rx="3" fill="#FFD700" opacity="0.7"/>
  </g>

  <!-- Skill badges (left) -->
  <g transform="translate(60, 200)">
    <rect width="110" height="22" rx="11" fill="#FF6B35" opacity="0.25" stroke="#FF6B35" stroke-width="1"/>
    <text x="55" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700">🔓 Cryptography</text>
  </g>
  <g transform="translate(60, 234)">
    <rect width="110" height="22" rx="11" fill="#FFD700" opacity="0.15" stroke="#FFD700" stroke-width="1"/>
    <text x="55" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700">📡 Network Scan</text>
  </g>
  <g transform="translate(60, 268)">
    <rect width="110" height="22" rx="11" fill="#FF6B35" opacity="0.2" stroke="#FF6B35" stroke-width="1"/>
    <text x="55" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700">🕵️ OSINT</text>
  </g>

  <!-- Title -->
  <text x="400" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="url(#accent)" filter="url(#glow)">HackerGo</text>
  <text x="400" y="430" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#8892b0">Gamified Cybersecurity Adventure App</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)"/>
</svg>
