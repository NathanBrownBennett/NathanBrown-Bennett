<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000d1a"/>
      <stop offset="100%" style="stop-color:#001020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0057E7"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Floor plan (faint) -->
  <g stroke="#0082FC" stroke-opacity="0.12" stroke-width="1.5" fill="none">
    <rect x="80" y="100" width="640" height="260"/>
    <line x1="280" y1="100" x2="280" y2="360"/>
    <line x1="520" y1="100" x2="520" y2="360"/>
    <line x1="80" y1="230" x2="280" y2="230"/>
    <line x1="520" y1="230" x2="720" y2="230"/>
  </g>

  <!-- BLE signal waves (central beacon) -->
  <g transform="translate(400, 220)" filter="url(#soft-glow)">
    <circle cx="0" cy="0" r="10" fill="#0082FC" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="#00D4FF" opacity="0.5"/>
    <!-- Signal rings -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#0082FC" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#0082FC" stroke-width="1" opacity="0.35"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#0082FC" stroke-width="0.75" opacity="0.2"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#0082FC" stroke-width="0.5" opacity="0.12"/>
  </g>

  <!-- Asset tags (BLE beacons on assets) -->
  <!-- Tag 1 -->
  <g transform="translate(160, 145)" filter="url(#glow)">
    <rect width="36" height="22" rx="5" fill="#0082FC" opacity="0.8"/>
    <text x="18" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">📡</text>
    <line x1="18" y1="22" x2="230" y2="75" stroke="#0082FC" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- Tag 2 -->
  <g transform="translate(560, 130)" filter="url(#glow)">
    <rect width="36" height="22" rx="5" fill="#00D4FF" opacity="0.8"/>
    <text x="18" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">📡</text>
    <line x1="18" y1="22" x2="-163" y2="68" stroke="#00D4FF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- Tag 3 -->
  <g transform="translate(160, 285)" filter="url(#glow)">
    <rect width="36" height="22" rx="5" fill="#0082FC" opacity="0.7"/>
    <text x="18" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff">📡</text>
    <line x1="18" y1="0" x2="214" y2="-67" stroke="#0082FC" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  </g>

  <!-- Tag 4 (ALERT - red highlight) -->
  <g transform="translate(560, 270)" filter="url(#glow)">
    <rect width="36" height="22" rx="5" fill="#FF4444" opacity="0.9"/>
    <text x="18" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">ALERT</text>
    <text x="60" y="15" font-family="monospace" font-size="8" fill="#FF4444" opacity="0.9">Moved!</text>
    <line x1="0" y1="11" x2="-167" y2="-52" stroke="#FF4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- Dashboard panel (top right) -->
  <g transform="translate(590, 50)">
    <rect width="160" height="100" rx="8" fill="#001832" stroke="#0082FC" stroke-width="1.2" opacity="0.9"/>
    <text x="10" y="20" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#00D4FF">📊 bluetakk</text>
    <text x="10" y="38" font-family="monospace" font-size="9" fill="#0082FC">Assets tracked: 12</text>
    <text x="10" y="52" font-family="monospace" font-size="9" fill="#00D4FF">All in zone: 11</text>
    <text x="10" y="66" font-family="monospace" font-size="9" fill="#FF4444">⚠ Alert: 1</text>
    <text x="10" y="82" font-family="monospace" font-size="9" fill="#0082FC">Battery OK: 12</text>
  </g>

  <!-- Bluetooth logo (left) -->
  <g transform="translate(68, 50)" filter="url(#glow)">
    <rect width="50" height="60" rx="6" fill="#001832" stroke="#0082FC" stroke-width="1.2" opacity="0.9"/>
    <text x="25" y="38" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#00D4FF" opacity="0.9">⚡</text>
  </g>

  <!-- Title -->
  <text x="400" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="url(#accent)" filter="url(#glow)">bluetakk</text>
  <text x="400" y="430" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#8892b0">Bluetooth Low Energy Asset Tracking</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)"/>
</svg>
