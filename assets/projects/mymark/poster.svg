<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a2e"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#48CAE4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#6C63FF" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Blockchain nodes (right side) -->
  <g filter="url(#glow)">
    <!-- Block chain links -->
    <rect x="540" y="120" width="80" height="44" rx="6" fill="none" stroke="#6C63FF" stroke-width="1.5" opacity="0.6"/>
    <rect x="550" y="128" width="60" height="8" rx="3" fill="#6C63FF" opacity="0.3"/>
    <rect x="550" y="142" width="40" height="6" rx="3" fill="#48CAE4" opacity="0.25"/>

    <rect x="540" y="195" width="80" height="44" rx="6" fill="none" stroke="#6C63FF" stroke-width="1.5" opacity="0.6"/>
    <rect x="550" y="203" width="60" height="8" rx="3" fill="#6C63FF" opacity="0.3"/>
    <rect x="550" y="217" width="40" height="6" rx="3" fill="#48CAE4" opacity="0.25"/>

    <rect x="540" y="270" width="80" height="44" rx="6" fill="none" stroke="#6C63FF" stroke-width="1.5" opacity="0.6"/>
    <rect x="550" y="278" width="60" height="8" rx="3" fill="#6C63FF" opacity="0.3"/>
    <rect x="550" y="292" width="40" height="6" rx="3" fill="#48CAE4" opacity="0.25"/>

    <!-- Chain links -->
    <line x1="580" y1="164" x2="580" y2="195" stroke="#6C63FF" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
    <line x1="580" y1="239" x2="580" y2="270" stroke="#6C63FF" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  </g>

  <!-- Fingerprint (center) -->
  <g transform="translate(310, 185)" fill="none" stroke="url(#accent)" stroke-width="1.8" opacity="0.9">
    <!-- Simplified fingerprint arcs -->
    <path d="M40,80 Q40,40 80,40 Q120,40 120,80 Q120,120 80,120 Q40,120 40,80" stroke-dasharray="5,3"/>
    <path d="M28,80 Q28,24 80,24 Q132,24 132,80 Q132,136 80,136 Q28,136 28,80" stroke-dasharray="5,3"/>
    <path d="M16,80 Q16,8 80,8 Q144,8 144,80 Q144,152 80,152 Q16,152 16,80" stroke-dasharray="5,3"/>
    <path d="M52,80 Q52,56 80,56 Q108,56 108,80 Q108,104 80,104" stroke-dasharray="5,3"/>
    <path d="M64,80 Q64,68 80,68 Q96,68 96,80 Q96,92 80,92" stroke-dasharray="5,3"/>
    <!-- Centre dot -->
    <circle cx="80" cy="80" r="5" fill="url(#accent)" stroke="none"/>
  </g>

  <!-- Lock icon (left) -->
  <g transform="translate(120, 160)" filter="url(#glow)">
    <rect x="0" y="26" width="60" height="50" rx="6" fill="none" stroke="#48CAE4" stroke-width="2" opacity="0.8"/>
    <rect x="12" y="30" width="36" height="6" rx="3" fill="#48CAE4" opacity="0.4"/>
    <path d="M15,26 Q15,5 30,5 Q45,5 45,26" fill="none" stroke="#48CAE4" stroke-width="2" opacity="0.8"/>
    <circle cx="30" cy="51" r="7" fill="#48CAE4" opacity="0.6"/>
    <line x1="30" y1="58" x2="30" y2="66" stroke="#48CAE4" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- Hash symbols (floating) -->
  <text x="160" y="140" font-family="monospace" font-size="11" fill="#6C63FF" opacity="0.5">0x4f2a...</text>
  <text x="490" y="360" font-family="monospace" font-size="10" fill="#48CAE4" opacity="0.4">SHA256: 8f3e...</text>
  <text x="90" y="350" font-family="monospace" font-size="10" fill="#6C63FF" opacity="0.35">VERIFIED ✓</text>

  <!-- Title -->
  <text x="400" y="400" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="url(#accent)">MyMark</text>
  <text x="400" y="430" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#8892b0">Media Fingerprinting &amp; Blockchain Watermarking</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent)"/>
</svg>
