<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Inspire Logo</title>
  <desc id="desc">Stylized Inspire wordmark with warm gradient and spark icon.</desc>
  <defs>
    <linearGradient id="inspireGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="640" height="220" rx="24" fill="#0f172a"/>
  <g filter="url(#softShadow)">
    <circle cx="92" cy="110" r="40" fill="url(#inspireGrad)"/>
    <path d="M92 66 L102 98 L135 98 L108 116 L118 149 L92 129 L66 149 L76 116 L49 98 L82 98 Z" fill="#ffffff" opacity="0.92"/>
  </g>

  <text x="170" y="127" fill="url(#inspireGrad)" font-family="Montserrat, Poppins, 'Segoe UI', sans-serif" font-size="78" font-weight="700" letter-spacing="2">INSPIRE</text>
  <text x="172" y="163" fill="#cbd5e1" font-family="Montserrat, Poppins, 'Segoe UI', sans-serif" font-size="20" font-weight="500" letter-spacing="3">MOTIVATION PLATFORM</text>
</svg>
